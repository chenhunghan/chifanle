<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭幫傭上工手冊產生器 · Buku Panduan Memasak</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --mint:#3E7C6B; --mint-deep:#1F3D34; --mint-pale:#E8EEEA;
  --paper:#FFFFFF; --ink:#1C221F; --sub:#5B6662;
  --warn:#B03A2E; --warn-bg:#FBEAE7;
  --line:#D6DED9;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC',sans-serif;background:var(--mint-pale);color:var(--ink);}
.id-text{font-style:italic;color:var(--mint);}
.py{color:var(--sub);font-size:.82em;letter-spacing:.03em;}

/* ---------- Screen layout ---------- */
.app{display:flex;min-height:100vh;}
.sidebar{width:320px;min-width:320px;background:var(--mint-deep);color:#EAF2EE;padding:22px 20px 40px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar h1{font-size:20px;font-weight:900;line-height:1.3;}
.sidebar h1 span{display:block;font-size:12px;font-weight:400;font-style:italic;color:#9CC4B5;margin-top:4px;}
.sidebar .hint{font-size:12px;color:#9CC4B5;margin:10px 0 18px;line-height:1.6;}
.group{margin-bottom:16px;}
.group h2{font-size:12px;letter-spacing:.15em;color:#7FB3A0;font-weight:700;margin-bottom:8px;border-bottom:1px solid #33564A;padding-bottom:4px;}
.chk{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:14px;line-height:1.4;}
.chk:hover{background:#2B4C41;}
.chk input{margin-top:3px;accent-color:#7FD6BC;}
.chk .tag{font-size:10px;background:#33564A;border-radius:4px;padding:1px 5px;margin-left:4px;color:#BFE3D5;white-space:nowrap;}
.chk .tag.pork{background:var(--warn);color:#fff;}
.btnrow{display:flex;gap:8px;margin:6px 0 14px;}
.btnrow button{flex:1;font-family:inherit;font-size:12px;padding:6px 0;border-radius:8px;border:1px solid #4A7263;background:transparent;color:#CDE7DC;cursor:pointer;}
.btnrow button:hover{background:#2B4C41;}
.printbtn{width:100%;font-family:inherit;font-size:16px;font-weight:900;padding:14px;border:none;border-radius:12px;background:#7FD6BC;color:var(--mint-deep);cursor:pointer;margin-top:8px;}
.printbtn:hover{background:#93E4CB;}
.print-hint{font-size:11px;color:#9CC4B5;margin-top:8px;line-height:1.6;}
.main{flex:1;padding:32px;display:flex;flex-direction:column;align-items:center;gap:24px;}

/* ---------- A4 pages ---------- */
.page{background:var(--paper);width:210mm;min-height:296mm;padding:14mm 16mm;box-shadow:0 4px 24px rgba(31,61,52,.18);position:relative;display:flex;flex-direction:column;}
.page.hidden{display:none;}
.pg-head{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--mint);padding-bottom:8px;margin-bottom:14px;}
.pg-head .zh{font-size:30px;font-weight:900;line-height:1.15;}
.pg-head .sub{margin-top:2px;font-size:14px;}
.badges{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--mint-pale);color:var(--mint-deep);white-space:nowrap;}
.badge.pork{background:var(--warn-bg);color:var(--warn);border:1px solid var(--warn);}
.cups{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--mint-deep);background:var(--mint-pale);border-radius:20px;padding:4px 12px;}
.cups svg{display:block;}
.sec-t{font-size:15px;font-weight:900;color:var(--mint);letter-spacing:.1em;margin:12px 0 6px;}
.sec-t small{font-weight:400;font-style:italic;letter-spacing:0;margin-left:6px;color:var(--mint);}
table.ing{width:100%;border-collapse:collapse;font-size:14px;}
table.ing td{border-bottom:1px solid var(--line);padding:5px 4px;vertical-align:top;}
table.ing td.amt{text-align:right;font-weight:700;white-space:nowrap;width:32%;}
.steps{list-style:none;counter-reset:st;}
.steps li{counter-increment:st;display:flex;gap:12px;padding:8px 0;border-bottom:1px dashed var(--line);}
.steps li::before{content:counter(st);flex:none;width:28px;height:28px;border-radius:50%;background:var(--mint);color:#fff;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;margin-top:2px;}
.steps .zh{font-size:16px;font-weight:500;line-height:1.5;}
.steps .id-text{font-size:13.5px;display:block;margin-top:2px;line-height:1.45;}
.note{margin-top:auto;background:var(--mint-pale);border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.6;}
.note.warn{background:var(--warn-bg);border:1.5px solid var(--warn);}
.note b{color:var(--mint-deep);}
.note.warn b{color:var(--warn);}
.foot{margin-top:10px;font-size:10px;color:var(--sub);display:flex;justify-content:space-between;}

/* vocab grid */
.vocab{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.vcard{border:1px solid var(--line);border-radius:10px;padding:5px 9px;}
.vcard .zh{font-size:19px;font-weight:900;}
.vcard .py{display:block;}
.vcard .id-text{font-size:13px;}

/* shopping list */
.shop li{display:flex;gap:10px;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--line);font-size:14.5px;list-style:none;}
.shop .box{flex:none;width:16px;height:16px;border:2px solid var(--mint);border-radius:3px;margin-top:3px;}
.shop .who{color:var(--sub);font-size:12.5px;}
.aisle{font-size:13px;font-weight:900;color:#fff;background:var(--mint);display:inline-block;border-radius:6px;padding:2px 10px;margin:12px 0 4px;}

/* 3-day rotation menu */
.rota{width:100%;border-collapse:collapse;table-layout:fixed;}
.rota th,.rota td{border:2px solid var(--mint);padding:6px 8px;vertical-align:top;}
.rota th{background:var(--mint);color:#fff;font-size:16px;}
.rota td.day{background:var(--mint-pale);width:62px;text-align:center;font-weight:900;font-size:15px;color:var(--mint-deep);}
.rota td.day .id-text{font-size:11px;font-weight:400;display:block;}
.rota .cell{font-size:13.5px;font-weight:700;line-height:1.45;outline:none;}
.rota .cell:focus{background:#F2FAF6;}
.rota .cell .id-text{font-size:10.5px;font-weight:400;display:block;margin-top:1px;}

/* cooker page */
.cook-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px;}
.cook-card{border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font-size:13.5px;line-height:1.55;}
.cook-card .t{font-weight:900;color:var(--mint-deep);font-size:15px;}
.watertbl{width:100%;border-collapse:collapse;font-size:14px;margin-top:4px;}
.watertbl th,.watertbl td{border:1px solid var(--line);padding:6px 8px;text-align:center;}
.watertbl th{background:var(--mint-pale);font-size:13px;}

/* ---------- Mobile-only chrome (drawer bar + mask). Desktop & print ignore. ---------- */
.mobile-bar{display:none;}
.drawer-mask{display:none;}

@media screen and (max-width:900px){
  .app{flex-direction:column;}

  /* sticky 頂部 mini bar:漢堡 + 標題 + 列印。永遠可見。 */
  .mobile-bar{display:flex;position:sticky;top:0;z-index:50;align-items:center;gap:10px;
    padding:10px 14px;background:var(--mint-deep);color:#EAF2EE;
    box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .mobile-bar .menu-btn{flex:none;width:44px;height:44px;border:none;border-radius:10px;
    background:#2B4C41;color:#fff;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .mobile-bar .title{flex:1;font-size:15px;font-weight:900;line-height:1.25;}
  .mobile-bar .title small{display:block;font-size:11px;font-weight:400;font-style:italic;color:#9CC4B5;}
  .mobile-bar .print-btn{flex:none;height:44px;padding:0 14px;border:none;border-radius:10px;
    background:#7FD6BC;color:var(--mint-deep);font-weight:900;font-size:14px;cursor:pointer;
    font-family:inherit;display:flex;align-items:center;gap:4px;}

  /* 側欄變抽屜:預設滑出螢幕外,加 .open 才顯示 */
  .sidebar{position:fixed;top:0;left:0;height:100vh;width:86vw;max-width:320px;min-width:0;
    z-index:60;transform:translateX(-105%);transition:transform .25s ease;
    box-shadow:4px 0 24px rgba(0,0,0,.25);}
  .sidebar.open{transform:translateX(0);}
  .drawer-mask{display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:55;opacity:0;pointer-events:none;transition:opacity .2s;}
  .drawer-mask.show{opacity:1;pointer-events:auto;}

  .main{padding:14px;}
  .page{width:100%;min-width:0;min-height:0;padding:14px;overflow-wrap:anywhere;box-shadow:0 2px 12px rgba(31,61,52,.12);}
  .page *{overflow-wrap:anywhere;}
  table{word-break:break-word;}
  table.ing td.amt{white-space:normal;width:auto;}

  /* 觸控目標放大到 ≥44px */
  .chk{padding:11px 10px;font-size:15px;}
  .chk input{width:22px;height:22px;flex:none;}
  .btnrow button{padding:12px 0;font-size:13px;}
  .printbtn{padding:16px;font-size:17px;}
  .shop li{padding:9px 0;}
  .shop .box{width:20px;height:20px;}

  /* 字體比例為手機校準(不影響桌面/列印) */
  .page .pg-head{padding-bottom:6px;margin-bottom:10px;}
  .page .pg-head .zh{font-size:22px;}
  .page .pg-head .sub{font-size:12px;}
  .sec-t{font-size:14px;margin:10px 0 5px;}
  .steps .zh{font-size:15px;}
  .steps li::before{width:24px;height:24px;font-size:13px;}
  table.ing{font-size:13px;}
  .note{font-size:12.5px;padding:9px 12px;}
  .badge{font-size:11px;}
  .cups{font-size:12px;}

  /* 詞卡:2 欄 + 卡片放鬆 */
  .vocab{grid-template-columns:1fr 1fr;gap:7px;}
  .vcard{padding:7px 10px;}
  .vcard .zh{font-size:17px;}
  .vcard .id-text{font-size:12px;}

  .foot{flex-wrap:wrap;gap:4px;}
}

/* ---------- Print (black & white optimized) ---------- */
@page{size:A4;margin:0;}
@media print{
  body{background:#fff;}
  :root{--mint:#000;--mint-deep:#000;--mint-pale:#F0F0F0;--sub:#444;--line:#999;--warn:#000;--warn-bg:#fff;}
  .id-text{color:#333;}
  .py{color:#555;}
  .badge{background:#fff;border:1.5px solid #000;color:#000;}
  .badge.pork{border:2.5px solid #000;font-weight:900;}
  .cups{background:#fff;border:1.5px solid #000;color:#000;}
  svg path{stroke:#000 !important;}
  .steps li::before{background:#000;color:#fff;}
  .rota th{background:#fff;color:#000;border:2px solid #000;}
  .rota th,.rota td{border-color:#000;}
  .rota td.day{background:#F0F0F0;color:#000;}
  .aisle{background:#fff;color:#000;border:1.5px solid #000;}
  .note.warn{border:2.5px solid #000;}
  .shop .box{border-color:#000;}
  .sidebar,.screen-only,.mobile-bar,.drawer-mask{display:none !important;}
  .main{padding:0;gap:0;display:block;}
  .page{box-shadow:none;width:210mm;height:296mm;page-break-after:always;overflow:hidden;}

  /* 常用中文頁:42 張詞卡擠進 A4 → 4 欄 + 緊湊卡片(拼音/印尼文同行) */
  #pg-vocab .vocab{grid-template-columns:repeat(4,1fr);gap:3px;}
  #pg-vocab .vcard{padding:2px 5px;border-width:1px;line-height:1.2;}
  #pg-vocab .vcard .zh{font-size:14px;}
  #pg-vocab .vcard .py{display:inline;font-size:8.5px;letter-spacing:0;}
  #pg-vocab .vcard .py::after{content:' ';}
  #pg-vocab .vcard .id-text{display:inline;font-size:9.5px;}
  #pg-vocab .sec-t,#pg-vocab .note{font-size:11px;}
  #pg-vocab .note{padding:6px 10px;margin-top:8px !important;}
  #pg-vocab .pg-head{padding-bottom:6px;margin-bottom:8px;}
  #pg-vocab .pg-head .zh{font-size:24px;}
  #pg-vocab .pg-head .sub{font-size:11px;}

  /* 食譜頁微縮,確保邊緣頁(如滷肉)塞進 A4 */
  .page .note{padding:7px 11px;font-size:11.5px;line-height:1.45;}
  .page .steps li{padding:6px 0;}
  .page .steps .zh{font-size:15px;}
  .page .steps .id-text{font-size:12.5px;}
  table.ing{font-size:13px;}
  table.ing td{padding:3px 4px;}

  /* 採購清單頁:允許跨頁(內容動態,不固定高度) */
  #pg-shop{height:auto;min-height:296mm;overflow:visible;}
  #pg-shop .shop li{padding:4px 0;font-size:12.5px;}
  #pg-shop .shop .who{font-size:11px;}
  #pg-shop .aisle{margin:8px 0 3px;font-size:12px;}

  .page.hidden{display:none !important;}
}
</style>
</head>
<body>
<div class="app">

<!-- ======================= MOBILE TOP BAR (screen-only) ======================= -->
<div class="mobile-bar screen-only">
  <button class="menu-btn" id="menuBtn" aria-label="開啟選單">☰</button>
  <div class="title">幫傭上工手冊<small>Buku Panduan Memasak</small></div>
  <button class="print-btn" onclick="window.print()">🖨 列印</button>
</div>
<div class="drawer-mask screen-only" id="drawerMask"></div>

<!-- ======================= SIDEBAR ======================= -->
<aside class="sidebar">
  <h1>幫傭上工手冊產生器<span>Buku Panduan Memasak untuk Perawat</span></h1>
  <p class="hint">勾選要列印的頁面 → 按「列印」→ 目的地選「儲存為 PDF」。每個項目就是一張 A4。</p>
  <div class="btnrow">
    <button onclick="setAll(true)">全選</button>
    <button onclick="setAll(false)">全部清除</button>
  </div>
  <div class="group"><h2>基礎頁 DASAR</h2><div id="nav-basic"></div></div>
  <div class="group"><h2>早餐 SARAPAN</h2><div id="nav-bf"></div></div>
  <div class="group"><h2>魚・肉・蛋 PROTEIN</h2><div id="nav-animal"></div></div>
  <div class="group"><h2>豆腐類 TAHU</h2><div id="nav-plant"></div></div>
  <div class="group"><h2>青菜・飯 SAYUR & NASI</h2><div id="nav-veg"></div></div>
  <button class="printbtn" onclick="window.print()">🖨 列印 / 存成 PDF</button>
  <p class="print-hint">列印視窗中也可再用「頁面範圍」只印其中幾頁。已針對黑白印表機最佳化,直接列印即可。含豬肉的菜有 ⚠️ 標示,請先與幫傭溝通。</p>
</aside>

<!-- ======================= PAGES ======================= -->
<main class="main" id="pages"></main>
</div>

<script>
/* ================= INGREDIENT DICTIONARY ================= */
const ING = {
  rice:{zh:'白米',py:'bái mǐ',id:'beras',aisle:'乾貨'},
  oats:{zh:'桂格大燕麥片',py:'yàn mài piàn',id:'havermut Quaker (oatmeal)',aisle:'乾貨'},
  milk:{zh:'鮮奶',py:'xiān nǎi',id:'susu segar',aisle:'冷藏'},
  eggskin:{zh:'蛋餅皮(冷藏)',py:'dàn bǐng pí',id:'kulit dadar gulung (rak dingin)',aisle:'冷藏'},
  flour:{zh:'中筋麵粉',py:'miàn fěn',id:'tepung terigu',aisle:'乾貨'},
  egg:{zh:'雞蛋',py:'jī dàn',id:'telur ayam',aisle:'冷藏'},
  tomato:{zh:'牛番茄',py:'niú fān qié',id:'tomat',aisle:'蔬菜'},
  anyveg:{zh:'青菜(任選一種):地瓜葉/菠菜/青江菜/空心菜/莧菜',py:'qīng cài',id:'sayur hijau (pilih satu): daun ubi / bayam / pakcoy / kangkung / bayam merah',aisle:'蔬菜'},
  cabbage:{zh:'高麗菜',py:'gāo lì cài',id:'kol / kubis',aisle:'蔬菜'},
  anyfish:{zh:'魚(任選一種):鯛魚片/鱸魚片/虱目魚肚/白帶魚切片',py:'yú',id:'ikan (pilih satu): fillet tilapia / fillet kakap / bandeng / layur',aisle:'生鮮(冷藏)'},
  shrimp:{zh:'白蝦(生鮮)',py:'bái xiā',id:'udang segar',aisle:'生鮮(冷藏)'},
  beef:{zh:'牛肉炒肉片(嫩肩里肌或梅花)',py:'niú ròu piàn',id:'irisan daging sapi (bagian sampil / chuck)',aisle:'生鮮(冷藏)'},
  greenpepper:{zh:'青椒',py:'qīng jiāo',id:'paprika hijau',aisle:'蔬菜'},
  cauliflower:{zh:'花椰菜(綠或白)',py:'huā yē cài',id:'brokoli atau kembang kol',aisle:'蔬菜'},

  porkshank:{zh:'豬老鼠肉(或豬腱肉) ⚠️豬肉',py:'lǎo shǔ ròu',id:'⚠️ daging BABI bagian betis (empuk)',aisle:'生鮮(冷藏)'},
  porklean:{zh:'豬後腿瘦肉 ⚠️豬肉',py:'zhū hòu tuǐ shòu ròu',id:'⚠️ daging paha BABI (tanpa lemak)',aisle:'生鮮(冷藏)'},
  tofu:{zh:'嫩豆腐(盒裝)',py:'nèn dòu fǔ',id:'tahu sutra (kotak)',aisle:'冷藏'},
  firmtofu:{zh:'板豆腐',py:'bǎn dòu fǔ',id:'tahu putih padat',aisle:'冷藏'},
  doufugan:{zh:'豆乾',py:'dòu gān',id:'tahu kering',aisle:'冷藏'},
  kelp:{zh:'海帶結',py:'hǎi dài jié',id:'rumput laut simpul',aisle:'冷藏'},
  wakame:{zh:'乾海帶芽',py:'hǎi dài yá',id:'rumput laut wakame kering',aisle:'乾貨'},
  miso:{zh:'味噌',py:'wèi zēng',id:'miso (pasta kedelai)',aisle:'冷藏'},
  loofah:{zh:'絲瓜',py:'sī guā',id:'oyong / gambas',aisle:'蔬菜'},
  clam:{zh:'蛤蜊',py:'gé lí',id:'kerang',aisle:'生鮮(冷藏)'},
  carrot:{zh:'紅蘿蔔',py:'hóng luó bo',id:'wortel',aisle:'蔬菜'},

  ginger:{zh:'薑',py:'jiāng',id:'jahe',aisle:'蔬菜'},
  scallion:{zh:'蔥',py:'cōng',id:'daun bawang',aisle:'蔬菜'},
  garlic:{zh:'蒜頭',py:'suàn tóu',id:'bawang putih',aisle:'蔬菜'},
  soy:{zh:'醬油',py:'jiàng yóu',id:'kecap asin',aisle:'乾貨'},
  salt:{zh:'鹽',py:'yán',id:'garam',aisle:'乾貨'},
  sugar:{zh:'糖',py:'táng',id:'gula',aisle:'乾貨'},
  oil:{zh:'橄欖油(或芥花油)',py:'gǎn lǎn yóu',id:'minyak zaitun (atau minyak kanola)',aisle:'乾貨'},
};

/* ================= RECIPES ================= */
const RECIPES = [
/* ---- 早餐 Sarapan ---- */
{key:'oatmeal', zh:'燕麥牛奶(早餐)', py:'yàn mài niú nǎi', id:'Havermut Susu Hangat', cups:0.5, tags:['早餐'],
 ings:[['oats','4 大匙 / 4 sendok makan'],['milk','1 杯 (約250ml) / 1 gelas']],
 steps:[
  ['馬克杯裡放 4 大匙燕麥片。','Masukkan 4 sendok makan havermut ke dalam mug.'],
  ['倒入鮮奶到 8 分滿。','Tuang susu segar sampai 80% penuh.'],
  ['外鍋加半杯水,馬克杯放進電鍋(不用蓋盤子)。','Panci luar setengah gelas air. Taruh mug di dalam penanak nasi.'],
  ['蓋上蓋子,按開關,跳起來就好。','Tutup, tekan tombol. Selesai saat tombol naik.'],

  ['外鍋 1 杯水,放入蒸架和盤子,蓋上蓋子,按開關。','Panci luar 1 gelas air. Masukkan rak dan piring. Tutup, tekan tombol.'],

function cupsSVG(n){
  let s='';
  for(let i=0;i<Math.ceil(n);i++)s+='<svg width="14" height="16" viewBox="0 0 14 16"><path d="M2 1h10l-1.5 14h-7z" fill="none" stroke="#3E7C6B" stroke-width="1.8"/><path d="M3 6h8" stroke="#3E7C6B" stroke-width="1.4"/></svg>';
  return s;
}

function recipePage(r){
  const pork=r.tags.includes('pork');

  const cups=r.cups>0?`<span class="cups">外鍋 panci luar ${cupsSVG(r.cups)} ${r.cups===0.5?'半':r.cups} 杯 gelas</span>`:'';
  return `<section class="page" id="pg-${r.key}" data-nav="recipe" data-zh="${r.zh}" data-id="${r.id}" data-pork="${pork}">
    <div class="pg-head">
      <div>
        <div class="zh">${r.zh}</div>
        <div class="sub"><span class="py">${r.py}</span> · <span class="id-text">${r.id}</span></div>
      </div>
      <div class="badges">${porkbadge}${cups}</div>
    </div>
    <div class="sec-t">食材 <small>Bahan-bahan</small></div>
    <table class="ing">${r.ings.map(([k,amt])=>{const g=ING[k];return `<tr><td><b>${g.zh}</b> <span class="py">${g.py}</span><br><span class="id-text">${g.id}</span></td><td class="amt">${amt}</td></tr>`}).join('')}</table>
    <div class="sec-t">步驟 <small>Cara Memasak</small></div>
    <ol class="steps">${r.steps.map(([zh,id])=>`<li><div><span class="zh">${zh}</span><span class="id-text">${id}</span></div></li>`).join('')}</ol>
    ${r.note?`<div class="note ${r.warn?'warn':''}"><b>💡 </b>${r.note[0]}${r.note[1]?`<br><span class="id-text">${r.note[1]}</span>`:''}</div>`:''}

}

  <div class="note" style="margin-top:12px"><b>💡 </b>每餐三樣菜:一份魚或肉(魚為主) + 一份豆腐 + 一份青菜,配白飯。燙青菜每天換一種(地瓜葉→菠菜→青江菜→空心菜→莧菜)。滷肉(⚠️豬肉)煮一鍋吃兩餐,第二餐加熱就好。蕃茄炒蛋、紅蘿蔔炒蛋、蒸蛋是「加菜」用,老人胃口好時多加一道。<br>
  <span class="id-text">Setiap makan 3 lauk: 1 ikan/daging + 1 tahu + 1 sayur + nasi. Ganti jenis sayur setiap hari. Semur babi (⚠️) sekali masak untuk dua kali makan. Masakan telur adalah lauk TAMBAHAN saat nafsu makan bagus.</span></div>
  <div class="note screen-only" style="margin-top:8px"><b>給雇主(此段不會印出):</b>畫面上可直接點格子修改菜色再列印。</div>
  <div class="foot"><span>家庭幫傭上工手冊</span><span>七日循環菜單 Menu Siklus</span></div>
</section>`;
}

/* ================= RENDER ================= */
const pagesEl=document.getElementById('pages');
pagesEl.innerHTML=basicPages()+RECIPES.map(recipePage).join('');

const navBasic=document.getElementById('nav-basic');
const CAT={oatmeal:'nav-bf',danbing:'nav-bf',fish:'nav-animal',shrimp:'nav-animal',beefonion:'nav-animal',greenpepperbeef:'nav-animal',milkfish:'nav-animal',mousepork:'nav-animal',tomatoegg:'nav-animal',carrotegg:'nav-animal',steamegg:'nav-animal',loofah:'nav-animal',clamsoup:'nav-animal',luro:'nav-animal',coldtofu:'nav-plant',braisedtofu:'nav-plant',misosoup:'nav-plant',braiseddougan:'nav-plant',veg:'nav-veg',cabbage:'nav-veg',eggplant:'nav-veg',cauliflower:'nav-veg',rice:'nav-veg'};
document.querySelectorAll('.page').forEach(pg=>{
  const label=document.createElement('label');label.className='chk';
  const pork=pg.dataset.pork==='true';
  label.innerHTML=`<input type="checkbox" checked data-target="${pg.id}"><span>${pg.dataset.zh}<br><span style="font-size:11px;font-style:italic;color:#9CC4B5">${pg.dataset.id}</span>${pork?'<span class="tag pork">⚠️豬肉</span>':''}</span>`;
  const key=pg.id.replace('pg-','');
  const target=pg.dataset.nav==='basic'?navBasic:document.getElementById(CAT[key]||'nav-veg');
  target.appendChild(label);
});
document.querySelectorAll('.chk input').forEach(cb=>cb.addEventListener('change',update));
function setAll(v){document.querySelectorAll('.chk input').forEach(cb=>cb.checked=v);update();}
function update(){
  document.querySelectorAll('.chk input').forEach(cb=>{
    document.getElementById(cb.dataset.target).classList.toggle('hidden',!cb.checked);
  });
  renderShop();
}

/* mobile drawer toggle (independent of core update logic) */
(function(){
  const sidebar=document.querySelector('.sidebar');
  const mask=document.getElementById('drawerMask');
  const btn=document.getElementById('menuBtn');
  if(!sidebar||!mask||!btn)return;
  function toggle(open){
    sidebar.classList.toggle('open',open);
    mask.classList.toggle('show',open);
  }
  btn.addEventListener('click',()=>toggle(!sidebar.classList.contains('open')));
  mask.addEventListener('click',()=>toggle(false));
})();

/* shopping list aggregation */
function renderShop(){
  const byAisle={};
  const pantry=['鹽','糖','醬油','橄欖油(或芥花油)','薑','蒜頭','蔥'];
  RECIPES.forEach(r=>{
    const cb=document.querySelector(`input[data-target="pg-${r.key}"]`);
    if(!cb||!cb.checked)return;
    r.ings.forEach(([k,amt])=>{
      const g=ING[k];
      if(pantry.includes(g.zh)){
        (byAisle['常備(家裡通常有)']=byAisle['常備(家裡通常有)']||{});
        (byAisle['常備(家裡通常有)'][k]=byAisle['常備(家裡通常有)'][k]||[]).push(null);return;
      }
      (byAisle[g.aisle]=byAisle[g.aisle]||{});
      (byAisle[g.aisle][k]=byAisle[g.aisle][k]||[]).push(`${amt.split('/')[0].trim()}(${r.zh})`);
    });
  });
  let html='';
  const order=['蔬菜','冷藏','生鮮(冷藏)','乾貨','常備(家裡通常有)'];
  order.forEach(a=>{
    if(!byAisle[a])return;
    html+=`<div class="aisle">${a}</div><ul class="shop">`;
    Object.entries(byAisle[a]).forEach(([k,uses])=>{
      const g=ING[k];
      const detail=uses[0]===null?'<span class="who">確認家裡還有沒有 / cek stok di rumah</span>':`<span class="who">${uses.join(' + ')}</span>`;
      html+=`<li><span class="box"></span><div><b>${g.zh}</b> <span class="py">${g.py}</span> · <span class="id-text">${g.id}</span><br>${detail}</div></li>`;
    });
    html+='</ul>';
  });
  document.getElementById('shoplist').innerHTML=html||'<p style="color:var(--sub)">左邊先勾選菜色,清單會自動整理。</p>';
}
update();
</script>
